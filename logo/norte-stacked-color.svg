<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350" width="300" height="350">
  <!-- Norte Financial — Stacked Logo (Color on transparent) -->
  <!-- Vertical layout: icon on top, wordmark below — ideal for large back prints -->

  <!-- Icon centered -->
  <g transform="translate(50, 10) scale(1)">
    <circle cx="100" cy="100" r="90" fill="none" stroke="#0B3D2E" stroke-width="3" opacity="0.15"/>
    <line x1="100" y1="14" x2="100" y2="24" stroke="#0B3D2E" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
    <line x1="100" y1="176" x2="100" y2="186" stroke="#0B3D2E" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
    <line x1="14" y1="100" x2="24" y2="100" stroke="#0B3D2E" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
    <line x1="176" y1="100" x2="186" y2="100" stroke="#0B3D2E" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
    <line x1="100" y1="38" x2="100" y2="162" stroke="#0B3D2E" stroke-width="3" stroke-linecap="round"/>
    <polygon points="100,28 88,58 100,48 112,58" fill="#1D9E75"/>
    <polygon points="100,172 88,142 100,152 112,142" fill="#0B3D2E" opacity="0.2"/>
    <line x1="50" y1="100" x2="150" y2="100" stroke="#0B3D2E" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
    <path d="M70 70 Q100 85 130 70" stroke="#7EC4A8" stroke-width="1.5" fill="none" opacity="0.4"/>
    <circle cx="100" cy="28" r="7" fill="#1D9E75"/>
    <circle cx="100" cy="28" r="3.5" fill="#E8F5F0"/>
    <circle cx="100" cy="100" r="5" fill="#0B3D2E"/>
    <circle cx="100" cy="100" r="2.5" fill="#E8F5F0"/>
  </g>

  <!-- Wordmark centered below -->
  <text x="150" y="260" font-family="'Playfair Display', Georgia, serif" font-size="52" font-weight="500" fill="#0B3D2E" letter-spacing="-1" text-anchor="middle">Norte</text>
  <text x="150" y="290" font-family="'DM Sans', -apple-system, sans-serif" font-size="14" font-weight="500" fill="#7A7A7A" letter-spacing="6" text-anchor="middle">FINANCIAL</text>

  <!-- Tagline -->
  <text x="150" y="330" font-family="'Playfair Display', Georgia, serif" font-size="14" font-style="italic" fill="#7EC4A8" text-anchor="middle" opacity="0.7">Tu norte financiero.</text>
</svg>
